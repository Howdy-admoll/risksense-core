version: '3.8'

services:
  risksense-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risksense-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=risksense/api.py
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./risksense:/app/risksense:ro
      - ./tests:/app/tests:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "app=risksense"
      - "version=0.1.0"
    command: >
      sh -c "python -c \"
        from risksense.api import create_app
        app = create_app()
        app.run(host='0.0.0.0', port=5000, debug=False)
      \""

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: risksense-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Optional: Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: risksense-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: risksense-network
