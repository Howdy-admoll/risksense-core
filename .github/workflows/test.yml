name: Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=risksense --cov-report=xml --cov-report=term-missing
      
      - name: Check code formatting with black
        run: black --check risksense/ tests/ examples/
      
      - name: Lint with flake8
        run: |
          flake8 risksense/ tests/ examples/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 risksense/ tests/ examples/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false